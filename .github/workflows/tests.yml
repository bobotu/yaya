name: Tests

on:
  push:
  pull_request:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run offline tests
        run: python -m unittest discover -s tests/unit -v
      - name: Compile Python files
        run: python -m compileall -q dev_tools custom_components tests
      - name: Ruff check
        run: |
          python -m pip install ruff
          ruff format --check dev_tools custom_components tests
          ruff check dev_tools custom_components tests
      - name: Validate metadata
        run: |
          python -m json.tool custom_components/yeelight_pro/manifest.json
          python -m json.tool custom_components/yeelight_pro/strings.json
          python -m json.tool hacs.json
          python -c "import tomllib; tomllib.load(open('pyproject.toml', 'rb'))"

  home-assistant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Home Assistant test harness
        run: python -m pip install -r tests/ha/requirements.txt
      - name: Run Home Assistant runtime tests
        run: python -m pytest tests/ha -vv
